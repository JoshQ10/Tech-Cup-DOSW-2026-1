# =============================================================
# Perfil: azure
# Uso: despliegue en Azure con PostgreSQL Flexible Server
# Activar: SPRING_PROFILES_ACTIVE=azure
#
# Variables de entorno requeridas:
#   AZURE_DB_HOST     -> ej: myserver.postgres.database.azure.com
#   AZURE_DB_NAME     -> nombre de la base de datos
#   AZURE_DB_USER     -> usuario de la BD
#   AZURE_DB_PASSWORD -> contrasena de la BD
#   ALLOWED_ORIGINS   -> origenes CORS permitidos (frontend)
# =============================================================

# Azure PostgreSQL Flexible Server (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${AZURE_DB_HOST}:5432/${AZURE_DB_NAME:techcup_db}?sslmode=require
spring.datasource.username=${AZURE_DB_USER}
spring.datasource.password=${AZURE_DB_PASSWORD}

# JPA - produccion (no modificar esquema automaticamente)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - origenes de produccion
spring.web.cors.allowed-origin-patterns=${ALLOWED_ORIGINS:https://localhost:*}

# Logging - menos verboso en produccion
logging.level.root=WARN
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=INFO
