# =============================================================
# Perfil: azure
# Uso: despliegue en Azure App Service con Supabase PostgreSQL
# Activar: SPRING_PROFILES_ACTIVE=azure
#
# Variables de entorno requeridas en Azure App Service:
#   SUPABASE_DB_HOST     -> ej: db.<project-ref>.supabase.co
#   SUPABASE_DB_NAME     -> postgres (default en Supabase)
#   SUPABASE_DB_USER     -> postgres.<project-ref>
#   SUPABASE_DB_PASSWORD -> contrasena del proyecto Supabase
#   SUPABASE_DB_PORT     -> 5432 (directa) o 6543 (pooler)
#   ALLOWED_ORIGINS      -> origenes CORS permitidos (frontend)
#   JWT_SECRET           -> secreto para tokens JWT
# =============================================================

# Supabase PostgreSQL (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Server - HTTP en Azure App Service (SSL terminado externamente por Azure)
server.port=8080
server.ssl.enabled=false

# JPA - Crear/actualizar tablas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP - Pool optimizado para Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway - habilitado con baseline para crear schema si no existe
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# CORS - origenes del frontend
spring.web.cors.allowed-origin-patterns=${ALLOWED_ORIGINS:https://localhost:*}

# Logging
logging.level.root=INFO
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=DEBUG
