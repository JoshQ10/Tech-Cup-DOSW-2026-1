spring:
  application:
    name: Tech-Cup-DOSW-BackEnd-2026-1
  
  datasource:
    url: jdbc:h2:mem:techcup_dev
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8443
  address: 0.0.0.0
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: techcup
    enabled: true
  http2:
    enabled: true
  servlet:
    encoding:
      charset: UTF-8
  shutdown: graceful
  compression:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    use-path-normalization: true
  show-actuator: false
  use-swagger-ui: true

app:
  security:
    require-ssl: true

logging:
  level:
    root: INFO
    eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1: DEBUG
  file:
    name: logs/tech-cup-api-dev.log

jwt:
  secret: TechCupDosw2026SecretKeyForJwtTokensMustBeLongEnough123456
  expiration-ms: 3600000
  refresh-expiration-ms: 604800000
