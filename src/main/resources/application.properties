spring.application.name=Tech-Cup-DOSW-BackEnd-2026-1

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/techcup_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080
server.address=0.0.0.0
spring.jackson.time-zone=America/Bogota

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.root=INFO
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=DEBUG
logging.file.name=logs/tech-cup-api.log

jwt.secret=TechCupDosw2026SecretKeyForJwtTokensMustBeLongEnough123456
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000