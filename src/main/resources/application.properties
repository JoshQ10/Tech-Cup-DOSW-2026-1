spring.application.name=Tech-Cup-Football-2026-1

# Base de datos H2 (desarrollo)
spring.datasource.url=jdbc:h2:mem:techcupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Evita ejecutar scripts SQL legacy que no estan alineados al modelo JPA actual
spring.sql.init.mode=never

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Correo (modo desarrollo)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Servidor
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# Logging
logging.level.root=INFO
logging.level.edu.dosw.proyecto=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
