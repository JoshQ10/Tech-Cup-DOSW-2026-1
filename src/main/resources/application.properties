spring.application.name=Tech-Cup-DOSW-BackEnd-2026-1

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:techcup_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server - HTTPS (puerto principal)
server.port=8443
server.address=0.0.0.0
server.shutdown=graceful

# Server - SSL Configuration (SOLO HTTPS - Sin HTTP)
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:password}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=techcup
server.http2.enabled=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# CORS - Solo HTTPS
spring.web.cors.allowed-origin-patterns=https://localhost:*,https://127.0.0.1:*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

logging.level.root=INFO
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=DEBUG
logging.file.name=logs/tech-cup-api.log

jwt.secret=${JWT_SECRET:TechCupDosw2026SecretKeyForJwtTokensMustBeLongEnough123456}
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

