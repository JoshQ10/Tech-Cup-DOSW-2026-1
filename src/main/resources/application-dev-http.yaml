spring:
  application:
    name: Tech-Cup-DOSW-BackEnd-2026-1
  
  datasource:
    url: jdbc:h2:mem:techcup_dev_http
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/success}
    jwt:
      access-token-ttl-ms: ${OAUTH2_ACCESS_TOKEN_TTL_MS:3600000}
      refresh-token-ttl-ms: ${OAUTH2_REFRESH_TOKEN_TTL_MS:86400000}
  email:
    from: ${EMAIL_FROM:noreply@techcup.edu.co}
    verification-url: ${EMAIL_VERIFICATION_URL:http://localhost:3000/verify-email}
    reset-password-url: ${EMAIL_RESET_PASSWORD_URL:http://localhost:3000/reset-password}
    mock-enabled: ${EMAIL_MOCK_ENABLED:false}
  security:
    require-ssl: false

server:
  port: 8080
  address: 0.0.0.0
  ssl:
    enabled: false
  http2:
    enabled: true
  servlet:
    encoding:
      charset: UTF-8
  shutdown: graceful
  compression:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

# Configuración de Swagger UI completa
  use-swagger-ui: true

logging:
  level:
    root: INFO
    eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/tech-cup-api-dev-http.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

jwt:
  secret: TechCupDosw2026SecretKeyForJwtTokensMustBeLongEnough123456
  expiration-ms: 3600000
  refresh-expiration-ms: 604800000
