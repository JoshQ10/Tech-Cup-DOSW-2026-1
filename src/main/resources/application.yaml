spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/success}
    jwt:
      access-token-ttl-ms: ${OAUTH2_ACCESS_TOKEN_TTL_MS:3600000}
      refresh-token-ttl-ms: ${OAUTH2_REFRESH_TOKEN_TTL_MS:86400000}
