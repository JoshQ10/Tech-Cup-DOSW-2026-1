spring:
  profiles:
    active: ssl-test
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:https://localhost:8443/api/auth/oauth2/success}
    jwt:
      access-token-ttl-ms: ${OAUTH2_ACCESS_TOKEN_TTL_MS:3600000}
      refresh-token-ttl-ms: ${OAUTH2_REFRESH_TOKEN_TTL_MS:86400000}

server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: techcup
  http2:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: ssl-test
  jpa:
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
