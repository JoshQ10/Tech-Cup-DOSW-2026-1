# =============================================================
# Perfil: qa
# Uso: despliegue en Azure App Service - Entorno QA
# Activar: SPRING_PROFILES_ACTIVE=qa
#
# Variables de entorno requeridas (GitHub Secret -> Azure App Service):
#   QA_DB_HOST        -> ej: techcup-qa.postgres.database.azure.com
#   QA_DB_NAME        -> nombre de la base de datos QA
#   QA_DB_USER        -> usuario de la BD QA
#   QA_DB_PASSWORD    -> contrasena de la BD QA
#   QA_ALLOWED_ORIGINS -> origenes CORS del frontend QA
# =============================================================

# Azure PostgreSQL Flexible Server QA (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${QA_DB_HOST}:5432/${QA_DB_NAME:techcup_qa}?sslmode=require
spring.datasource.username=${QA_DB_USER}
spring.datasource.password=${QA_DB_PASSWORD}

# JPA - QA: permite actualizaciones para facilitar iteraciones
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - origenes del frontend QA
spring.web.cors.allowed-origin-patterns=${QA_ALLOWED_ORIGINS:https://localhost:*}

# Logging - mas detallado que prod para diagnosticar problemas en QA
logging.level.root=INFO
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=DEBUG
