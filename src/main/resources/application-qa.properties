# =============================================================
# Perfil: qa
# Uso: despliegue en Azure App Service - Entorno QA con Supabase
# Activar: SPRING_PROFILES_ACTIVE=qa
#
# Variables de entorno requeridas (GitHub Secret -> Azure App Service):
#   SUPABASE_DB_HOST     -> ej: db.<project-ref>.supabase.co
#   SUPABASE_DB_NAME     -> postgres (default en Supabase)
#   SUPABASE_DB_USER     -> postgres.<project-ref>
#   SUPABASE_DB_PASSWORD -> contrasena del proyecto Supabase
#   SUPABASE_DB_PORT     -> 5432 (directa) o 6543 (pooler)
#   QA_ALLOWED_ORIGINS   -> origenes CORS del frontend QA
# =============================================================

# Supabase PostgreSQL QA (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Server - HTTP en QA (Azure App Service termina SSL externamente)
server.port=8080
server.ssl.enabled=false

# JPA - QA: update para crear tablas si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - origenes del frontend QA
spring.web.cors.allowed-origin-patterns=${QA_ALLOWED_ORIGINS:https://localhost:*}

# Flyway - gestiona migraciones de esquema en QA
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

# HikariCP - Pool optimizado para Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging - mas detallado que prod para diagnosticar problemas en QA
logging.level.root=INFO
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=DEBUG
