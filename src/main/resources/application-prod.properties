# =============================================================
# Perfil: prod
# Uso: despliegue en Azure App Service - PRODUCCION con Supabase
# Activar: SPRING_PROFILES_ACTIVE=prod
#
# Variables de entorno requeridas (GitHub Secret -> Azure App Service):
#   SUPABASE_DB_HOST     -> ej: db.<project-ref>.supabase.co
#   SUPABASE_DB_NAME     -> postgres (default en Supabase)
#   SUPABASE_DB_USER     -> postgres.<project-ref>
#   SUPABASE_DB_PASSWORD -> contrasena del proyecto Supabase
#   SUPABASE_DB_PORT     -> 5432 (directa) o 6543 (pooler)
#   PROD_ALLOWED_ORIGINS -> origenes CORS del frontend PROD
# =============================================================

# Supabase PostgreSQL PROD (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# Server - HTTP (Azure App Service termina SSL externamente)
server.port=8080
server.ssl.enabled=false

# JPA - produccion: validate para no modificar esquema automaticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - solo origenes de produccion
spring.web.cors.allowed-origin-patterns=${PROD_ALLOWED_ORIGINS:https://localhost:*}

# Flyway - gestiona migraciones de esquema en produccion
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# HikariCP - Pool optimizado para Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT
jwt.secret=${JWT_SECRET:TechCupDosw2026SecretKeyForJwtTokensMustBeLongEnough123456}
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# SMTP / Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App email URLs (deben apuntar al frontend real de produccion)
app.email.from=${EMAIL_FROM:noreply@techcup.edu.co}
app.email.verification-url=${EMAIL_VERIFICATION_URL:https://techcup.app/verify-email}
app.email.reset-password-url=${EMAIL_RESET_PASSWORD_URL:https://techcup.app/reset-password}

# Logging - minimo en produccion
logging.level.root=WARN
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=INFO
