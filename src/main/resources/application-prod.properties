# =============================================================
# Perfil: prod
# Uso: despliegue en Azure App Service - Entorno PRODUCCION
# Activar: SPRING_PROFILES_ACTIVE=prod
#
# Variables de entorno requeridas (GitHub Secret -> Azure App Service):
#   PROD_DB_HOST        -> ej: techcup-prod.postgres.database.azure.com
#   PROD_DB_NAME        -> nombre de la base de datos PROD
#   PROD_DB_USER        -> usuario de la BD PROD
#   PROD_DB_PASSWORD    -> contrasena de la BD PROD
#   PROD_ALLOWED_ORIGINS -> origenes CORS del frontend PROD
# =============================================================

# Azure PostgreSQL Flexible Server PROD (SSL obligatorio)
spring.datasource.url=jdbc:postgresql://${PROD_DB_HOST}:5432/${PROD_DB_NAME:techcup_prod}?sslmode=require
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASSWORD}

# JPA - produccion: nunca modificar esquema automaticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS - solo origenes de produccion
spring.web.cors.allowed-origin-patterns=${PROD_ALLOWED_ORIGINS}

# Logging - minimo en produccion
logging.level.root=WARN
logging.level.eci.edu.co.Tech_Cup_DOSW_BackEnd_2026_1=INFO
