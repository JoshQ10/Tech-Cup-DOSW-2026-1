version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: techcup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: techcup_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - techcup_pgdata:/var/lib/postgresql/data

volumes:
  techcup_pgdata:
